$font_ui = Sans

general {
    hide_cursor = true
}

animations {
    enabled = true
    bezier = smooth, 0.22, 1, 0.36, 1
    animation = fadeIn, 1, 3.2, smooth
    animation = fadeOut, 1, 2.2, smooth
    animation = inputFieldDots, 1, 1.8, smooth
    animation = inputFieldWidth, 1, 2.0, smooth
    animation = inputFieldFade, 1, 1.2, smooth
}

background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 8
    noise = 0.0117
    contrast = 0.95
    brightness = 0.78
    vibrancy = 0.12
    vibrancy_darkness = 0.2
}

label {
    monitor =
    text = $TIME
    color = rgba(255, 255, 255, 0.96)
    font_size = 88
    font_family = $font_ui
    shadow_passes = 2
    shadow_size = 6
    shadow_color = rgba(0, 0, 0, 0.35)

    position = 0, 110
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A · %d"
    color = rgba(255, 255, 255, 0.72)
    font_size = 18
    font_family = $font_ui
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(0, 0, 0, 0.25)

    position = 0, 42
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 280, 56
    outline_thickness = 1
    dots_size = 0.22
    dots_spacing = 0.22
    dots_center = true
    outer_color = rgba(255, 255, 255, 0.18)
    inner_color = rgba(20, 20, 20, 0.28)
    font_color = rgba(255, 255, 255, 0.92)
    font_family = $font_ui
    fade_on_empty = false
    rounding = 999
    check_color = rgba(255, 255, 255, 0.32)
    fail_color = rgba(255, 120, 120, 0.55)
    fail_text = <i>$FAIL</i>
    placeholder_text = <span alpha='55%'>unlock</span>
    hide_input = false
    capslock_color = rgba(255, 215, 128, 0.45)

    position = 0, -58
    halign = center
    valign = center
}

label {
    monitor =
    text = $LAYOUT[EN,ES,PT,DE,FR]
    color = rgba(255, 255, 255, 0.60)
    font_size = 12
    font_family = $font_ui

    position = 0, -108
    halign = center
    valign = center
}
